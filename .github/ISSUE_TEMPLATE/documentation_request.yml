name: Documentation request
description: Request a documentation improvement where current docs are unclear, incomplete, or misleading.
title: "[Docs] "
labels:
  - docs
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What is unclear, missing, or inaccurate?
    validations:
      required: true
  - type: dropdown
    id: doc_area
    attributes:
      label: Area
      options:
        - README
        - Contributing guide
        - Architecture docs
        - Repository structure docs
        - Runbooks or issue docs
        - API docs
    validations:
      required: true
  - type: textarea
    id: user_impact
    attributes:
      label: User impact
      description: Explain how the current documentation gap slows development, review, or operation.
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Suggested improvement
      description: Describe the documentation change that would close the gap.
  - type: dropdown
    id: reviewer_type
    attributes:
      label: Primary reader
      options:
        - New contributor
        - Hiring reviewer
        - Tech lead
        - Operator or maintainer
        - API or dashboard consumer
