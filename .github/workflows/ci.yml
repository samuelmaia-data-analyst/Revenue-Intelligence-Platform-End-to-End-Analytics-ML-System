name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip check

      - name: Ruff
        run: python -m ruff check .

      - name: Black check
        run: python -m black --check .

      - name: Mypy
        run: python -m mypy src services

      - name: Pytest
        run: python -m pytest --cov=src --cov=services --cov-report=term-missing --cov-fail-under=85

      - name: Docker build (streamlit app)
        run: docker build -t revenue-intelligence .

      - name: Docker build (serving api)
        run: docker build -f Dockerfile.api -t revenue-intelligence-api .
