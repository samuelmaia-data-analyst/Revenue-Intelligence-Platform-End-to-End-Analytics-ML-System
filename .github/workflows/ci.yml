name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip check

      - name: isort
        run: python -m isort --check-only .

      - name: Ruff
        run: python -m ruff check .

      - name: Black check
        run: python -m black --check .

      - name: Mypy
        run: python -m mypy src services contracts main.py

      - name: Pytest with coverage
        run: python -m pytest -q --cov=src --cov=services --cov=contracts --cov-report=term-missing --cov-report=xml

      - name: Dashboard smoke test
        run: python scripts/smoke_dashboard.py

      - name: Dashboard UI snapshot
        run: python scripts/ui_snapshot.py

      - name: API smoke test
        run: python scripts/smoke_api.py

      - name: Downstream SQL smoke test
        run: python scripts/smoke_downstream_sql.py

      - name: Processed exports smoke test
        run: python scripts/smoke_processed_exports.py

      - name: Partner payload smoke test
        run: python scripts/smoke_partner_payload.py

      - name: Build package
        run: python -m build

      - name: Wheel install smoke test
        run: |
          python -m venv .wheel-venv
          . .wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m pip check
          python -c "from src.config import PipelineConfig; from services.api.main import app; print(PipelineConfig.__name__); print(app.title)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml

  dbt-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      DBT_TARGET: ci
      DBT_SQLITE_PATH: data/warehouse/revenue_intelligence.db
      DBT_SQLITE_SCHEMA_DIR: data/warehouse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies and dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install dbt-core dbt-sqlite
          python -m pip check

      - name: Build local warehouse artifacts
        run: python -m src.pipeline run --log-level INFO

      - name: dbt SQLite smoke validation
        run: python scripts/smoke_dbt_sqlite.py

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, dbt-sqlite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (streamlit app)
        run: docker build --progress=plain -t revenue-intelligence .

      - name: Docker build (serving api)
        run: docker build --progress=plain -f Dockerfile.api -t revenue-intelligence-api .

      - name: API container smoke test
        run: |
          docker run -d --name revenue-intelligence-api-smoke -p 8000:8000 revenue-intelligence-api
          python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/health"
          deadline = time.time() + 45
          last_error = None

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  if payload.get("status") in {"ok", "degraded"}:
                      break
              except Exception as exc:  # noqa: BLE001
                  last_error = exc
                  time.sleep(2)
          else:
              raise SystemExit(f"API container smoke failed: {last_error}")
          PY
          docker logs revenue-intelligence-api-smoke --tail 100
          docker stop revenue-intelligence-api-smoke

      - name: Container smoke test
        run: |
          mkdir -p ci_artifacts
          docker run --rm \
            -v "${{ github.workspace }}/ci_artifacts:/tmp/rip-artifacts" \
            -e RIP_DATA_DIR=/tmp/rip-artifacts/data \
            revenue-intelligence \
            python -m src.pipeline run --log-level INFO
          test -f ci_artifacts/data/processed/pipeline_manifest.json
          test -f ci_artifacts/data/processed/quality_report.json
          test -f ci_artifacts/data/processed/kpi_snapshot.json
          test -f ci_artifacts/data/processed/recommendations.csv
          test -f ci_artifacts/data/processed/top_10_actions.csv

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: revenue-intelligence-smoke-${{ github.sha }}
          path: |
            ci_artifacts/data/processed/pipeline_manifest.json
            ci_artifacts/data/processed/quality_report.json
            ci_artifacts/data/processed/kpi_snapshot.json
