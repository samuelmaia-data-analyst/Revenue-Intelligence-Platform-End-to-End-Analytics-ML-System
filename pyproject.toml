[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "revenue-intelligence-platform"
version = "1.1.0"
description = "Executive revenue intelligence platform with pipelines, scoring API, and Streamlit delivery."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Samuel Maia" }]
dependencies = [
  "fastapi==0.115.12",
  "joblib==1.4.2",
  "matplotlib==3.10.1",
  "numpy==2.1.3",
  "pandas==2.2.3",
  "plotly==6.0.0",
  "pydantic==2.11.2",
  "scikit-learn==1.6.1",
  "seaborn==0.13.2",
  "streamlit==1.43.1",
  "uvicorn==0.34.0",
]

[project.optional-dependencies]
dev = [
  "black[jupyter]==24.10.0",
  "httpx==0.28.1",
  "mypy==1.15.0",
  "pre-commit==4.2.0",
  "pytest==8.3.5",
  "pytest-cov==6.1.1",
  "ruff==0.6.9",
]

[project.scripts]
rip-pipeline = "src.pipeline:main"
rip-api = "src.api_cli:main"
rip-app = "src.app_cli:main"

[tool.setuptools.packages.find]
include = ["api", "app", "contracts", "contracts.*", "services", "services.*", "src"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
(
  /(
      \.venv
    | __pycache__
    | data
  )/
)
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "__pycache__", "data"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
