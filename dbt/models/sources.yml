version: 2

sources:
  - name: warehouse
    schema: main
    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 2, period: day}
    tables:
      - name: scored_customers
        loaded_at_field: as_of_date
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
      - name: recommendations
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
      - name: unit_economics
        columns:
          - name: channel
            tests:
              - not_null
              - unique
      - name: top_10_actions
        columns:
          - name: customer_id
            tests:
              - not_null
